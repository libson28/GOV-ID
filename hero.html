<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Hero Section</title>
</head>

<body >

    <section class="bg-gradient-to-r from-gray-50 to-purple-100 min-h-screen flex items-center">
        <div class="max-w-7xl mx-auto px-6 py-16 w-full">
             <div class="grid lg:grid-cols-2 gap-12 items-center">

            <!-- LEFT CONTENT -->
            <div>
                <h1 class="text-4xl md:text-5xl font-bold text-gray-900 leading-tight">
                    Bibliothèque Numérique <br />
                    du Gouvernement du <br />
                    Sénégal
                </h1>

                <p class="mt-6 text-gray-500 max-w-md">
                    Accédez facilement à tous les documents officiels, décrets, projets de loi et
                    archives historiques du gouvernement sénégalais dans une plateforme moderne et
                    intuitive.
                </p>

                <div class="mt-8 flex items-center gap-6">
                    <button class="bg-indigo-600 text-white px-5 py-3 rounded-lg shadow hover:bg-indigo-700 transition">
                        Commencer la recherche
                    </button>

                    <a href="#" class="text-gray-700 font-medium hover:underline">
                        Découvrir →
                    </a>
                </div>
            </div>

            <!-- RIGHT IMAGES -->
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">

                <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d"
                    class="rounded-2xl shadow-lg object-cover h-40 w-full" />

                <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c"
                    class="rounded-2xl shadow-lg object-cover h-60 w-full" />

                <img src="https://images.unsplash.com/photo-1552664730-d307ca884978"
                    class="rounded-2xl shadow-lg object-cover h-40 w-full" />

                <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c"
                    class="rounded-2xl shadow-lg object-cover h-60 w-full" />

                <img src="https://images.unsplash.com/photo-1543269865-cbf427effbad"
                    class="rounded-2xl shadow-lg object-cover h-40 w-full" />

                <img src="https://images.unsplash.com/photo-1556761175-4b46a572b786"
                    class="rounded-2xl shadow-lg object-cover h-60 w-full" />

            </div>

        </div>
        </div>
       
    </section>

</body>

</html>
